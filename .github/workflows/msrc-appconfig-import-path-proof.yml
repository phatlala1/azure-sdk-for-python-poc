name: MSRC App Configuration Import path proof

on:
  push:
    paths:
      - .github/workflows/msrc-appconfig-import-path-proof.yml
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Run safe path command-substitution proof
        run: |
          set -u
          proof_log="$RUNNER_TEMP/msrc-appconfig-import-path-proof.log"
          : > "$proof_log"
          action_path="$RUNNER_TEMP/fake-action"
          mkdir -p "$action_path/scripts"
          cat > "$action_path/scripts/validate-inputs.sh" <<'VALIDATE'
          #!/usr/bin/env bash
          echo "validate_path=$1"
          VALIDATE
          cat > "$action_path/scripts/import-file.sh" <<'IMPORT'
          #!/usr/bin/env bash
          echo "import_name=$1"
          echo "import_path=$2"
          echo "import_prefix=$3"
          echo "import_label=$4"
          IMPORT
          chmod +x "$action_path/scripts/validate-inputs.sh" "$action_path/scripts/import-file.sh"

          run_case() {
            local name="$1"
            local input_path="$2"
            local marker="$RUNNER_TEMP/${name}.marker"
            local rendered_path="${input_path/__MARKER__/$marker}"
            local run_script="$action_path/scripts/validate-inputs.sh \"$rendered_path\" \"\" \"\"
          if [[ ! -z \"$rendered_path\" ]]; then
            $action_path/scripts/import-file.sh \"demoappconfig\" \"$rendered_path\" \"\" \"\"
          else
            echo \"Import from source app configuration or app service is currently not supported.\"
            exit 1
          fi"
            rm -f "$marker"
            {
              echo "case=$name"
              echo "input_path=$rendered_path"
              echo "rendered_run_start"
              echo "$run_script"
              echo "rendered_run_end"
            } | tee -a "$proof_log"
            bash -lc "$run_script" | tee -a "$proof_log"
            {
              echo "exit_code=$?"
              echo "marker_exists=$(test -f "$marker" && echo true || echo false)"
              if test -f "$marker"; then echo "marker_value=$(cat "$marker")"; fi
              echo
            } | tee -a "$proof_log"
          }

          echo "runner_os=$RUNNER_OS" | tee -a "$proof_log"
          echo "event_name=$GITHUB_EVENT_NAME" | tee -a "$proof_log"
          echo "repository=$GITHUB_REPOSITORY" | tee -a "$proof_log"
          echo "sha=$GITHUB_SHA" | tee -a "$proof_log"
          echo "source_sink=Azure/app-configuration-import-action action.yml lines 30 and 33" | tee -a "$proof_log"
          run_case negative_control 'config.json'
          run_case positive_path '$(printf msrc_appconfig_path_payload > __MARKER__)config.json'
          grep -q 'marker_exists=false' "$proof_log"
          grep -q 'marker_exists=true' "$proof_log"
          grep -q 'marker_value=msrc_appconfig_path_payload' "$proof_log"
      - name: Upload proof log
        uses: actions/upload-artifact@v4
        with:
          name: msrc-appconfig-import-path-proof-log
          path: ${{ runner.temp }}/msrc-appconfig-import-path-proof.log
          if-no-files-found: error
