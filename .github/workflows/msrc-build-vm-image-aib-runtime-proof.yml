name: MSRC Build VM Image AIB runtime proof

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: af971b8a-2947-4e82-8359-a76927a8abb7
  AZURE_TENANT_ID: fbd5a907-f158-45ed-a279-fba70ffc9055
  AZURE_SUBSCRIPTION_ID: 9de67d4a-bbc5-4003-b2aa-8f4579a277df
  AIB_RESOURCE_GROUP: rg-msrc-aib-proof-06300343
  AIB_LOCATION: eastus2
  AIB_MANAGED_IDENTITY: /subscriptions/9de67d4a-bbc5-4003-b2aa-8f4579a277df/resourcegroups/rg-msrc-aib-proof-06300343/providers/Microsoft.ManagedIdentity/userAssignedIdentities/mi-msrc-aib-proof-06300343
  AIB_SOURCE_IMAGE: Canonical:0001-com-ubuntu-server-jammy:22_04-lts:latest
  AIB_VM_SIZE: Standard_D2s_v3

jobs:
  positive-aib-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      template_name: ${{ steps.capture.outputs.template_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare positive customizer source
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          positive_source="$GITHUB_WORKSPACE/"'msrc$(printf payload_before_trusted_customizer>msrc_aib_runtime_marker)'
          mkdir -p "$positive_source"
          printf 'owned positive artifact\n' > "$positive_source/owned-artifact.txt"
          rm -f msrc_aib_runtime_marker
          {
            echo "case=positive"
            echo "event_name=$GITHUB_EVENT_NAME"
            echo "trusted_workflow_file_sha=$GITHUB_SHA"
            echo "customizer_source=$positive_source"
            echo "pre_runner_marker_exists=$(test -f msrc_aib_runtime_marker && echo true || echo false)"
          } | tee positive-prep.txt
          echo "customizer_source=$positive_source" >> "$GITHUB_OUTPUT"

      - name: Run Azure build-vm-image positive
        id: aib_positive
        uses: Azure/build-vm-image@v0.1.1
        continue-on-error: true
        with:
          resource-group-name: ${{ env.AIB_RESOURCE_GROUP }}
          image-builder-template-name: msrcAibPositive${{ github.run_id }}
          build-timeout-in-minutes: 90
          vm-size: ${{ env.AIB_VM_SIZE }}
          managed-identity: ${{ env.AIB_MANAGED_IDENTITY }}
          location: ${{ env.AIB_LOCATION }}
          source-os-type: linux
          source-image-type: PlatformImage
          source-image: ${{ env.AIB_SOURCE_IMAGE }}
          customizer-source: ${{ steps.prep.outputs.customizer_source }}
          customizer-script: |
            echo trusted_customizer_script_start
            echo marker_present_before_trusted_customizer=$(test -f msrc_aib_runtime_marker && echo true || echo false)
            if test -f msrc_aib_runtime_marker; then cat msrc_aib_runtime_marker; fi
          dist-type: VHD
          dist-image-tags: msrc:build-vm-image-positive

      - name: Capture positive outputs
        id: capture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          template_name="msrcAibPositive${GITHUB_RUN_ID}"
          echo "template_name=$template_name" >> "$GITHUB_OUTPUT"
          cat > evidence/positive-action-outputs.json <<JSON
          {
            "case": "positive",
            "action_outcome": "${{ steps.aib_positive.outcome }}",
            "imagebuilder_run_status": "${{ steps.aib_positive.outputs.imagebuilder-run-status }}",
            "run_output_name": "${{ steps.aib_positive.outputs.run-output-name }}",
            "custom_image_uri": "${{ steps.aib_positive.outputs.custom-image-uri }}",
            "template_name": "$template_name",
            "trusted_workflow_file_sha": "$GITHUB_SHA"
          }
          JSON
          cat positive-prep.txt > evidence/positive-prep.txt
          az image builder show -g "$AIB_RESOURCE_GROUP" -n "$template_name" -o json > evidence/positive-generated-template.json || true
          az image builder show-runs -g "$AIB_RESOURCE_GROUP" -n "$template_name" -o json > evidence/positive-aib-run-status.json || true
          az resource list -g "$AIB_RESOURCE_GROUP" -o json > evidence/positive-action-resources.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: build-vm-image-positive-aib-runtime
          path: evidence/

  negative-aib-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: positive-aib-runtime
    if: always()
    outputs:
      template_name: ${{ steps.capture.outputs.template_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare negative customizer source
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          negative_source="$GITHUB_WORKSPACE/msrc-safe-artifact"
          mkdir -p "$negative_source"
          printf 'owned negative artifact\n' > "$negative_source/owned-artifact.txt"
          rm -f msrc_aib_runtime_marker
          {
            echo "case=negative"
            echo "event_name=$GITHUB_EVENT_NAME"
            echo "trusted_workflow_file_sha=$GITHUB_SHA"
            echo "customizer_source=$negative_source"
            echo "pre_runner_marker_exists=$(test -f msrc_aib_runtime_marker && echo true || echo false)"
          } | tee negative-prep.txt
          echo "customizer_source=$negative_source" >> "$GITHUB_OUTPUT"

      - name: Run Azure build-vm-image negative
        id: aib_negative
        uses: Azure/build-vm-image@v0.1.1
        continue-on-error: true
        with:
          resource-group-name: ${{ env.AIB_RESOURCE_GROUP }}
          image-builder-template-name: msrcAibNegative${{ github.run_id }}
          build-timeout-in-minutes: 90
          vm-size: ${{ env.AIB_VM_SIZE }}
          managed-identity: ${{ env.AIB_MANAGED_IDENTITY }}
          location: ${{ env.AIB_LOCATION }}
          source-os-type: linux
          source-image-type: PlatformImage
          source-image: ${{ env.AIB_SOURCE_IMAGE }}
          customizer-source: ${{ steps.prep.outputs.customizer_source }}
          customizer-script: |
            echo trusted_customizer_script_start
            echo marker_present_before_trusted_customizer=$(test -f msrc_aib_runtime_marker && echo true || echo false)
            if test -f msrc_aib_runtime_marker; then cat msrc_aib_runtime_marker; fi
          dist-type: VHD
          dist-image-tags: msrc:build-vm-image-negative

      - name: Capture negative outputs
        id: capture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          template_name="msrcAibNegative${GITHUB_RUN_ID}"
          echo "template_name=$template_name" >> "$GITHUB_OUTPUT"
          cat > evidence/negative-action-outputs.json <<JSON
          {
            "case": "negative",
            "action_outcome": "${{ steps.aib_negative.outcome }}",
            "imagebuilder_run_status": "${{ steps.aib_negative.outputs.imagebuilder-run-status }}",
            "run_output_name": "${{ steps.aib_negative.outputs.run-output-name }}",
            "custom_image_uri": "${{ steps.aib_negative.outputs.custom-image-uri }}",
            "template_name": "$template_name",
            "trusted_workflow_file_sha": "$GITHUB_SHA"
          }
          JSON
          cat negative-prep.txt > evidence/negative-prep.txt
          az image builder show -g "$AIB_RESOURCE_GROUP" -n "$template_name" -o json > evidence/negative-generated-template.json || true
          az image builder show-runs -g "$AIB_RESOURCE_GROUP" -n "$template_name" -o json > evidence/negative-aib-run-status.json || true
          az resource list -g "$AIB_RESOURCE_GROUP" -o json > evidence/negative-action-resources.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: build-vm-image-negative-aib-runtime
          path: evidence/
