name: MSRC Build VM Image AIB runtime proof

on:
  workflow_dispatch:
    inputs:
      case:
        description: Runtime proof case to run
        required: true
        default: positive
        type: choice
        options:
          - positive
          - negative

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: af971b8a-2947-4e82-8359-a76927a8abb7
  AZURE_TENANT_ID: fbd5a907-f158-45ed-a279-fba70ffc9055
  AZURE_SUBSCRIPTION_ID: 9de67d4a-bbc5-4003-b2aa-8f4579a277df
  AIB_RESOURCE_GROUP: rg-msrc-aib-proof-06300343
  AIB_LOCATION: eastus2
  AIB_MANAGED_IDENTITY: /subscriptions/9de67d4a-bbc5-4003-b2aa-8f4579a277df/resourcegroups/rg-msrc-aib-proof-06300343/providers/Microsoft.ManagedIdentity/userAssignedIdentities/mi-msrc-aib-proof-06300343
  AIB_SOURCE_IMAGE: Canonical:0001-com-ubuntu-server-jammy:22_04-lts:latest
  AIB_VM_SIZE: Standard_D2s_v3

jobs:
  aib-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare customizer source
        id: prep
        shell: bash
        env:
          CASE_NAME: ${{ github.event.inputs.case }}
        run: |
          set -euo pipefail
          if [ "$CASE_NAME" = "positive" ]; then
            customizer_source="$GITHUB_WORKSPACE/"'msrc||true;printf${IFS}payload_before_trusted_customizer>msrc_aib_runtime_marker;#'
            template_name="msrcAibPositive${GITHUB_RUN_ID}"
          else
            customizer_source="$GITHUB_WORKSPACE/msrc-safe-artifact"
            template_name="msrcAibNegative${GITHUB_RUN_ID}"
          fi
          mkdir -p "$customizer_source"
          printf 'owned %s artifact\n' "$CASE_NAME" > "$customizer_source/owned-artifact.txt"
          rm -f msrc_aib_runtime_marker
          {
            echo "case=$CASE_NAME"
            echo "event_name=$GITHUB_EVENT_NAME"
            echo "trusted_workflow_file_sha=$GITHUB_SHA"
            echo "customizer_source=$customizer_source"
            echo "template_name=$template_name"
            echo "pre_runner_marker_exists=$(test -f msrc_aib_runtime_marker && echo true || echo false)"
          } | tee prep.txt
          echo "customizer_source=$customizer_source" >> "$GITHUB_OUTPUT"
          echo "template_name=$template_name" >> "$GITHUB_OUTPUT"

      - name: Run Azure build-vm-image
        id: aib
        uses: Azure/build-vm-image@v0.1.1
        continue-on-error: true
        with:
          resource-group-name: ${{ env.AIB_RESOURCE_GROUP }}
          image-builder-template-name: ${{ steps.prep.outputs.template_name }}
          build-timeout-in-minutes: 90
          vm-size: ${{ env.AIB_VM_SIZE }}
          managed-identity: ${{ env.AIB_MANAGED_IDENTITY }}
          location: ${{ env.AIB_LOCATION }}
          source-os-type: linux
          source-image-type: PlatformImage
          source-image: ${{ env.AIB_SOURCE_IMAGE }}
          customizer-source: ${{ steps.prep.outputs.customizer_source }}
          customizer-script: |
            echo trusted_customizer_script_start
            echo marker_present_before_trusted_customizer=$(test -f msrc_aib_runtime_marker && echo true || echo false)
            if test -f msrc_aib_runtime_marker; then cat msrc_aib_runtime_marker; fi
          dist-type: VHD
          dist-image-tags: msrc:${{ github.event.inputs.case }}

      - name: Capture outputs
        shell: bash
        env:
          CASE_NAME: ${{ github.event.inputs.case }}
          TEMPLATE_NAME: ${{ steps.prep.outputs.template_name }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          cat > "evidence/${CASE_NAME}-action-outputs.json" <<JSON
          {
            "case": "$CASE_NAME",
            "action_outcome": "${{ steps.aib.outcome }}",
            "imagebuilder_run_status": "${{ steps.aib.outputs.imagebuilder-run-status }}",
            "run_output_name": "${{ steps.aib.outputs.run-output-name }}",
            "custom_image_uri": "${{ steps.aib.outputs.custom-image-uri }}",
            "template_name": "$TEMPLATE_NAME",
            "trusted_workflow_file_sha": "$GITHUB_SHA"
          }
          JSON
          cp prep.txt "evidence/${CASE_NAME}-prep.txt"
          az image builder show -g "$AIB_RESOURCE_GROUP" -n "$TEMPLATE_NAME" -o json > "evidence/${CASE_NAME}-generated-template.json" || true
          az image builder show-runs -g "$AIB_RESOURCE_GROUP" -n "$TEMPLATE_NAME" -o json > "evidence/${CASE_NAME}-aib-run-status.json" || true
          az resource list -g "$AIB_RESOURCE_GROUP" -o json > "evidence/${CASE_NAME}-action-resources.json" || true

      - uses: actions/upload-artifact@v4
        with:
          name: build-vm-image-${{ github.event.inputs.case }}-aib-runtime
          path: evidence/
