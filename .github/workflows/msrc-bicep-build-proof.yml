name: MSRC Bicep Build input proof

on:
  push:
    paths:
      - .github/workflows/msrc-bicep-build-proof.yml
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  proof:
    runs-on: ubuntu-latest
    steps:
      - name: Run safe Bicep Build command-substitution proof
        run: |
          set -u
          proof_log="$RUNNER_TEMP/msrc-bicep-build-proof.log"
          : > "$proof_log"
          fakebin="$RUNNER_TEMP/fakebin"
          mkdir -p "$fakebin"
          cat > "$fakebin/az" <<'AZ'
          #!/usr/bin/env bash
          printf 'az_called:%s\n' "$*"
          AZ
          chmod +x "$fakebin/az"
          export PATH="$fakebin:/usr/bin:/bin"

          run_case() {
            local name="$1"
            local bicep_input="$2"
            local output_input="$3"
            local marker="$RUNNER_TEMP/${name}.marker"
            local bicep_rendered="${bicep_input/__MARKER__/$marker}"
            local output_rendered="${output_input/__MARKER__/$marker}"
            local run_script="set -euo pipefail
          az bicep build --file \"$bicep_rendered\" --outfile \"$output_rendered\""
            rm -f "$marker"
            {
              echo "case=$name"
              echo "bicepFilePath=$bicep_rendered"
              echo "outputFilePath=$output_rendered"
            } | tee -a "$proof_log"
            bash -lc "$run_script" | tee -a "$proof_log"
            {
              echo "exit_code=$?"
              echo "marker_exists=$(test -f "$marker" && echo true || echo false)"
              if test -f "$marker"; then echo "marker_value=$(cat "$marker")"; fi
              echo
            } | tee -a "$proof_log"
          }

          echo "runner_os=$RUNNER_OS" | tee -a "$proof_log"
          echo "event_name=$GITHUB_EVENT_NAME" | tee -a "$proof_log"
          echo "repository=$GITHUB_REPOSITORY" | tee -a "$proof_log"
          echo "sha=$GITHUB_SHA" | tee -a "$proof_log"
          echo "source_sink=Azure/bicep-build-action action.yml line 21" | tee -a "$proof_log"
          payload='$(printf msrc_bicep_build_payload > __MARKER__)'
          run_case negative_control './main.bicep' './azuredeploy.json'
          run_case positive_bicep_file_path "${payload}./main.bicep" './azuredeploy.json'
          run_case positive_output_file_path './main.bicep' "${payload}./azuredeploy.json"
          grep -q 'case=negative_control' "$proof_log"
          grep -q 'marker_exists=false' "$proof_log"
          grep -q 'case=positive_bicep_file_path' "$proof_log"
          grep -q 'case=positive_output_file_path' "$proof_log"
          grep -q 'marker_exists=true' "$proof_log"
          grep -q 'marker_value=msrc_bicep_build_payload' "$proof_log"

      - name: Upload proof log
        uses: actions/upload-artifact@v4
        with:
          name: msrc-bicep-build-proof-log
          path: ${{ runner.temp }}/msrc-bicep-build-proof.log
          if-no-files-found: error
