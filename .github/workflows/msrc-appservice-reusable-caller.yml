name: MSRC AppService reusable caller and controls

on:
  workflow_dispatch:
    inputs:
      source_directory_value:
        description: Caller-controlled value forwarded to reusable workflow source-directory
        required: true
        default: '.$(printf "01_eval_payload_before_oryx\n" >> "$GITHUB_WORKSPACE/msrc_order.txt"; printf "dummy_environment_canary_seen=%s\n" "${MSRC_DUMMY_CANARY:-absent}" > "$GITHUB_WORKSPACE/msrc_canary.txt"; mkdir -p "$GITHUB_WORKSPACE/dist"; printf "01_payload_tampered_build_output\n" > "$GITHUB_WORKSPACE/dist/msrc_build_output_tamper.txt")'
      output_directory_value:
        description: Caller-controlled value forwarded to reusable workflow output-directory
        required: true
        default: 'out$(mkdir -p "$GITHUB_WORKSPACE/out"; printf "payload_created_output_file\n" > "$GITHUB_WORKSPACE/out/msrc_output_tamper.txt")'

permissions:
  contents: read

jobs:
  call-reusable-central:
    name: call reusable central workflow
    uses: ./.github/workflows/msrc-appservice-reusable-central.yml
    with:
      source_directory_value: ${{ inputs.source_directory_value }}
      output_directory_value: ${{ inputs.output_directory_value }}

  version-v3:
    name: version matrix v3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Prepare app
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {"scripts":{"build":"echo version_v3_build"},"dependencies":{},"devDependencies":{}}
          JSON
          echo 'console.log("version v3")' > index.js
          rm -f msrc_version_v3.txt
      - name: Run Azure/appservice-build@v3
        id: appservice
        uses: Azure/appservice-build@v3
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: '.$(printf "version_v3_payload\n" > "$GITHUB_WORKSPACE/msrc_version_v3.txt")'
          platform: nodejs
      - name: Collect version evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/evidence"
          {
            echo "case=version_v3"
            echo "action_ref=Azure/appservice-build@v3"
            echo "workflow_sha=${GITHUB_SHA}"
            echo "action_outcome=${{ steps.appservice.outcome }}"
            echo "version_v3_marker_exists=$(test -f msrc_version_v3.txt && echo true || echo false)"
            [ -f msrc_version_v3.txt ] && cat msrc_version_v3.txt
          } | tee "$RUNNER_TEMP/evidence/version-v3.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: appservice-version-v3
          path: ${{ runner.temp }}/evidence/

  version-resolved-sha:
    name: version matrix resolved sha
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Prepare app
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {"scripts":{"build":"echo version_sha_build"},"dependencies":{},"devDependencies":{}}
          JSON
          echo 'console.log("version sha")' > index.js
          rm -f msrc_version_sha.txt
      - name: Run Azure/appservice-build resolved SHA
        id: appservice
        uses: Azure/appservice-build@fb787afed09d7c240cf0a72b42a266142741fde6
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: '.$(printf "version_resolved_sha_payload\n" > "$GITHUB_WORKSPACE/msrc_version_sha.txt")'
          platform: nodejs
      - name: Collect version evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/evidence"
          {
            echo "case=version_resolved_sha"
            echo "action_ref=Azure/appservice-build@fb787afed09d7c240cf0a72b42a266142741fde6"
            echo "workflow_sha=${GITHUB_SHA}"
            echo "action_outcome=${{ steps.appservice.outcome }}"
            echo "version_resolved_sha_marker_exists=$(test -f msrc_version_sha.txt && echo true || echo false)"
            [ -f msrc_version_sha.txt ] && cat msrc_version_sha.txt
          } | tee "$RUNNER_TEMP/evidence/version-resolved-sha.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: appservice-version-resolved-sha
          path: ${{ runner.temp }}/evidence/

  version-main:
    name: version matrix main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Prepare app
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {"scripts":{"build":"echo version_main_build"},"dependencies":{},"devDependencies":{}}
          JSON
          echo 'console.log("version main")' > index.js
          rm -f msrc_version_main.txt
      - name: Run Azure/appservice-build@main
        id: appservice
        uses: Azure/appservice-build@main
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: '.$(printf "version_main_payload\n" > "$GITHUB_WORKSPACE/msrc_version_main.txt")'
          platform: nodejs
      - name: Collect version evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/evidence"
          {
            echo "case=version_main"
            echo "action_ref=Azure/appservice-build@main"
            echo "workflow_sha=${GITHUB_SHA}"
            echo "action_outcome=${{ steps.appservice.outcome }}"
            echo "version_main_marker_exists=$(test -f msrc_version_main.txt && echo true || echo false)"
            [ -f msrc_version_main.txt ] && cat msrc_version_main.txt
          } | tee "$RUNNER_TEMP/evidence/version-main.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: appservice-version-main
          path: ${{ runner.temp }}/evidence/

  patched-four-inputs:
    name: patched no-eval four inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create patched local copy
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v3 https://github.com/Azure/appservice-build.git patched-appservice-build
          cat > patched-appservice-build/entrypoint.sh <<'SH'
          #!/bin/sh
          set -e
          checkArg() {
              case $1 in
                  (*[![:blank:]]*) echo "$1";;
                  (*) echo "";;
              esac
          }
          getAbsolutePath(){
              local path="$1"
              if [ -z "$path" ]; then
                  echo "$PWD"
                  return
              fi
              case $path in
                  /*) echo "$path" ;;
                  *) echo "$PWD/$path" ;;
              esac
          }
          sourceDirectory=$(checkArg "$1")
          platform=$(checkArg "$2")
          platformVersion=$(checkArg "$3")
          outputDirectory=$(checkArg "$4")
          if [ -z "$sourceDirectory" ]; then
              sourceDirectory="$PWD"
          else
              sourceDirectory=$(getAbsolutePath "$sourceDirectory")
          fi
          set -- oryx build "$sourceDirectory"
          if [ -n "$outputDirectory" ]; then
              outputDirectory=$(getAbsolutePath "$outputDirectory")
              set -- "$@" -o "$outputDirectory"
          fi
          if [ -n "$platform" ]; then
              set -- "$@" --platform "$platform"
          fi
          if [ -n "$platformVersion" ]; then
              set -- "$@" --platform-version "$platformVersion"
          fi
          echo "Running patched command without eval"
          "$@"
          SH
          chmod +x patched-appservice-build/entrypoint.sh

      - name: Prepare app
        shell: bash
        run: |
          set -euo pipefail
          cat > package.json <<'JSON'
          {"scripts":{"build":"echo patched_build_script"},"dependencies":{},"devDependencies":{}}
          JSON
          echo 'console.log("patched controls")' > index.js
          rm -f msrc_patched_source.txt msrc_patched_output.txt msrc_patched_platform.txt msrc_patched_version.txt

      - name: Patched source-directory payload
        id: patched_source
        uses: ./patched-appservice-build
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: '.$(printf "payload_patched_source\n" > "$GITHUB_WORKSPACE/msrc_patched_source.txt")'
          platform: nodejs

      - name: Patched output-directory payload
        id: patched_output
        uses: ./patched-appservice-build
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: .
          output-directory: 'out$(printf "payload_patched_output\n" > "$GITHUB_WORKSPACE/msrc_patched_output.txt")'
          platform: nodejs

      - name: Patched platform payload
        id: patched_platform
        uses: ./patched-appservice-build
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: .
          platform: 'nodejs$(printf "payload_patched_platform\n" > "$GITHUB_WORKSPACE/msrc_patched_platform.txt")'

      - name: Patched platform-version payload
        id: patched_version
        uses: ./patched-appservice-build
        continue-on-error: true
        env:
          ORYX_DISABLE_TELEMETRY: "true"
        with:
          source-directory: .
          platform: nodejs
          platform-version: '16.20.2$(printf "payload_patched_version\n" > "$GITHUB_WORKSPACE/msrc_patched_version.txt")'

      - name: Collect patched control evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/evidence"
          {
            echo "case=patched_four_inputs"
            echo "workflow_sha=${GITHUB_SHA}"
            echo "patched_source_outcome=${{ steps.patched_source.outcome }}"
            echo "patched_output_outcome=${{ steps.patched_output.outcome }}"
            echo "patched_platform_outcome=${{ steps.patched_platform.outcome }}"
            echo "patched_version_outcome=${{ steps.patched_version.outcome }}"
            echo "patched_source_directory_marker=$(test -f msrc_patched_source.txt && echo true || echo false)"
            echo "patched_output_directory_marker=$(test -f msrc_patched_output.txt && echo true || echo false)"
            echo "patched_platform_marker=$(test -f msrc_patched_platform.txt && echo true || echo false)"
            echo "patched_platform_version_marker=$(test -f msrc_patched_version.txt && echo true || echo false)"
          } | tee "$RUNNER_TEMP/evidence/patched-four-inputs.txt"

      - uses: actions/upload-artifact@v4
        with:
          name: appservice-patched-four-inputs
          path: ${{ runner.temp }}/evidence/
